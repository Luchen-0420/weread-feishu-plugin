<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的读书笔记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#f6f0e7',
                        ink: '#2d241c',
                        sand: '#e6d4ba',
                        caramel: '#bb8b4a',
                        cream: '#fffdf8'
                    },
                    boxShadow: {
                        soft: '0 14px 40px rgba(61, 42, 22, 0.10)'
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        :root {
            --bg: #fcfcfa;
            --panel: rgba(255, 255, 255, 0.9);
            --card: transparent;
            --line: #e7e5df;
            --text: #1f1f1b;
            --muted: #76746d;
            --accent: #92714f;
            --accent-soft: #f6f1ea;
            --thought: #f8f5ef;
            --quote: transparent;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(0, 0, 0, 0.025), transparent 18%),
                linear-gradient(180deg, #ffffff 0%, #fbfbf8 100%);
            font-family: "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .grain::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.18;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
            background-size: 22px 22px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.85), transparent 90%);
        }

        .shelf-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }

        .shelf-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .shelf-grid {
                column-count: 2;
            }
        }

        @media (min-width: 1180px) {
            .shelf-grid {
                column-count: 3;
            }
        }

        .book-card {
            overflow: hidden;
            border: 1px solid rgba(234, 219, 199, 0.95);
            border-radius: 24px;
            background: rgba(255, 253, 249, 0.9);
            box-shadow: 0 18px 48px rgba(65, 46, 25, 0.08);
            backdrop-filter: blur(12px);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 54px rgba(65, 46, 25, 0.12);
        }

        .cover-stage {
            position: relative;
            height: 18rem;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(145deg, rgba(255, 248, 236, 0.95), rgba(242, 229, 209, 0.88));
        }

        .cover-stage::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 10%, rgba(130, 96, 53, 0.08) 100%);
            pointer-events: none;
        }

        .cover-backdrop {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px);
            transform: scale(1.12);
            opacity: 0.28;
        }

        .cover-image {
            position: relative;
            z-index: 1;
            max-height: 100%;
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 16px 36px rgba(42, 31, 18, 0.28);
        }

        .note-cards {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .note-section {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .note-section-body {
            position: relative;
            padding-left: 2.6rem;
        }

        .note-section-body::before {
            content: "";
            position: absolute;
            left: 0.8rem;
            top: 0.2rem;
            bottom: 0.2rem;
            width: 1px;
            background: linear-gradient(180deg, transparent, var(--line) 4%, var(--line) 96%, transparent);
        }

        .note-section-title {
            margin: 0;
            padding-left: 2.6rem;
            color: #24231f;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            font-family: "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", sans-serif;
        }

        .note-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .note-card {
            position: relative;
            padding: 0 0 0 1.75rem;
            background: transparent;
            border: 0;
            border-radius: 0;
            box-shadow: none;
            min-width: 0;
        }

        .note-card::before {
            content: "";
            position: absolute;
            left: -1.95rem;
            top: 0.55rem;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid #d4d1ca;
        }

        .note-source {
            margin: 0;
            padding: 0;
            line-height: 2;
            color: #292824;
            background: transparent;
            border-left: 0;
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", serif;
            font-size: 1.06rem;
        }

        .note-source + .note-source {
            margin-top: 1rem;
        }

        .note-thought {
            margin-top: 0.9rem;
            padding: 0.9rem 1rem;
            line-height: 1.9;
            color: #4d3e2f;
            background: var(--thought);
            border-radius: 8px;
            font-style: italic;
            font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        }

        .note-time {
            padding: 0.75rem 0 0;
            color: var(--muted);
            font-size: 0.8rem;
            background: transparent;
            border-top: 0;
            letter-spacing: 0.02em;
        }

        .note-misc {
            padding: 0 0 0 1.75rem;
            color: #555148;
            line-height: 1.95;
            position: relative;
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
        }

        .note-misc::before {
            content: "";
            position: absolute;
            left: -1.95rem;
            top: 0.65rem;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #f5f3ee;
            border: 1px solid #ddd8cf;
        }

        .note-misc p,
        .note-source p,
        .note-thought p {
            margin: 0 0 0.55rem;
        }

        .note-misc p:last-child,
        .note-source p:last-child,
        .note-thought p:last-child {
            margin-bottom: 0;
        }

        .note-misc img,
        .note-source img,
        .note-thought img {
            max-width: 100%;
            border-radius: 6px;
        }

        .note-misc blockquote {
            margin: 0.75rem 0;
            padding-left: 1rem;
            border-left: 4px solid #d9c0a0;
            color: #6c5a48;
            font-style: italic;
        }

        .note-divider {
            margin: 0.25rem 0 0.25rem 1.75rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e8e4dd 8%, #e8e4dd 92%, transparent);
        }

        @media (max-width: 640px) {
            .note-section-title {
                padding-left: 2rem;
                font-size: 1.12rem;
            }

            .note-section-body {
                padding-left: 2rem;
            }

            .note-section-body::before {
                left: 0.55rem;
            }

            .note-card {
                padding-left: 1.35rem;
            }

            .note-card::before,
            .note-misc::before {
                left: -1.5rem;
            }

            .note-divider {
                margin-left: 1.35rem;
            }
        }

        .clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .fade-up {
            animation: fadeUp 0.45s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="grain">
    <div id="app" class="min-h-screen pb-16">
        <header class="sticky top-0 z-50 border-b border-[#eadcc8] bg-[rgba(250,246,239,0.82)] backdrop-blur-xl">
            <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-3">
                    <button
                        v-if="currentView === 'detail'"
                        @click="goBack"
                        class="rounded-full border border-[#e7d7c0] bg-white/70 p-2 text-[#6e5a46] transition hover:text-[#2d241c]"
                        aria-label="返回"
                    >
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div>
                        <h1 class="cursor-pointer text-2xl font-bold tracking-tight text-[#2d241c]" @click="goBack">我的读书笔记</h1>
                        <p class="text-sm text-[#7c6b5a]">把微信读书笔记整理成更舒服的卡片墙</p>
                    </div>
                </div>
                <div v-if="currentView === 'list'" class="text-sm text-[#7c6b5a]">共 {{ books.length }} 本书</div>
            </div>

            <div v-if="currentView === 'list' && categories.length" class="mx-auto flex max-w-7xl gap-2 overflow-x-auto px-4 pb-4 no-scrollbar sm:px-6 lg:px-8">
                <button
                    @click="activeCategory = '全部'"
                    class="whitespace-nowrap rounded-full border px-4 py-1.5 text-sm font-medium transition"
                    :class="activeCategory === '全部' ? 'border-[#2d241c] bg-[#2d241c] text-white' : 'border-[#e7d7c0] bg-white/70 text-[#6f5e4a] hover:bg-[#f6ecdc]'"
                >全部</button>
                <button
                    v-for="cat in categories"
                    :key="cat"
                    @click="activeCategory = cat"
                    class="whitespace-nowrap rounded-full border px-4 py-1.5 text-sm font-medium transition"
                    :class="activeCategory === cat ? 'border-[#2d241c] bg-[#2d241c] text-white' : 'border-[#e7d7c0] bg-white/70 text-[#6f5e4a] hover:bg-[#f6ecdc]'"
                >{{ cat }}</button>
            </div>
        </header>

        <main class="mx-auto mt-8 max-w-7xl px-4 sm:px-6 lg:px-8">
            <div v-if="loading" class="py-24 text-center text-lg text-[#7c6b5a]">
                正在加载笔记数据...
            </div>

            <div v-else-if="error" class="rounded-3xl border border-red-200 bg-red-50 p-6 text-red-700 shadow-soft">
                <h2 class="mb-2 text-lg font-bold">读取数据失败</h2>
                <p>{{ error }}</p>
                <p class="mt-3 text-sm text-red-600">请确认 `weread_data.json` 与 `index.html` 位于同一目录，并通过本地服务打开页面。</p>
            </div>

            <template v-else-if="currentView === 'list'">
                <div v-if="paginatedBooks.length === 0" class="py-24 text-center text-[#7c6b5a]">
                    当前分类下还没有笔记内容。
                </div>

                <template v-else>
                    <div class="shelf-grid">
                        <article v-for="book in paginatedBooks" :key="book.bookid" class="shelf-item fade-up">
                            <div class="book-card">
                                <div class="cover-stage">
                                    <img v-if="book.封面链接" :src="book.封面链接" alt="" class="cover-backdrop">
                                    <img v-if="book.封面链接" :src="book.封面链接" :alt="book.书名" class="cover-image">
                                    <div v-else class="text-sm text-[#8a7762]">暂无封面</div>
                                </div>

                                <div class="p-5">
                                    <div class="mb-3 flex items-start justify-between gap-4">
                                        <h2 class="clamp-2 text-xl font-bold leading-tight text-[#2d241c]" :title="book.书名">{{ book.书名 || '未知书名' }}</h2>
                                    </div>

                                    <p class="mb-4 text-sm text-[#6f5e4a]">{{ book.作者 || '未知作者' }}</p>

                                    <div class="mb-4 flex flex-wrap gap-2">
                                        <span v-if="book.一级分类" class="rounded-full bg-[#f4e8d5] px-3 py-1 text-xs text-[#6e5438]">{{ book.一级分类 }}</span>
                                        <span class="rounded-full border border-[#eadcc8] bg-white/80 px-3 py-1 text-xs text-[#7c6b5a]">{{ book.是否读完 || '未知状态' }}</span>
                                        <span class="rounded-full border border-[#eadcc8] bg-white/80 px-3 py-1 text-xs text-[#7c6b5a]">阅读：{{ formatReadingTime(book.阅读时长) }}</span>
                                    </div>

                                    <p v-if="book.简介" class="clamp-3 mb-5 text-sm italic leading-7 text-[#7c6b5a]">
                                        “{{ book.简介 }}”
                                    </p>

                                    <div class="border-t border-[#eee2d0] pt-4">
                                        <button
                                            v-if="book.笔记 && book.笔记.trim()"
                                            @click="openDetail(book)"
                                            class="flex w-full items-center justify-between text-left group"
                                        >
                                            <span class="font-medium text-[#2d241c]">查看笔记卡片</span>
                                            <span class="text-sm text-[#8a7762] transition group-hover:text-[#2d241c]">进入详情</span>
                                        </button>
                                        <div v-else class="text-sm text-[#9a8a77]">暂无笔记</div>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>

                    <div v-if="totalPages > 1" class="mt-10 flex justify-center border-t border-[#eadcc8] pt-8">
                        <nav class="flex items-center gap-3">
                            <button
                                @click="currentPage--"
                                :disabled="currentPage === 1"
                                class="rounded-xl border border-[#e5d4bb] bg-white/80 px-4 py-2 text-sm text-[#5f503f] transition hover:bg-[#faf1e2] disabled:cursor-not-allowed disabled:opacity-45"
                            >上一页</button>
                            <span class="text-sm text-[#7c6b5a]">{{ currentPage }} / {{ totalPages }}</span>
                            <button
                                @click="currentPage++"
                                :disabled="currentPage === totalPages"
                                class="rounded-xl border border-[#e5d4bb] bg-white/80 px-4 py-2 text-sm text-[#5f503f] transition hover:bg-[#faf1e2] disabled:cursor-not-allowed disabled:opacity-45"
                            >下一页</button>
                        </nav>
                    </div>
                </template>
            </template>

            <template v-else-if="currentView === 'detail' && selectedBook">
                <section class="mx-auto max-w-4xl fade-up">
                    <div class="mb-10 overflow-hidden rounded-[8px] border border-[#ece9e2] bg-white">
                        <div class="flex flex-col sm:flex-row">
                            <div class="flex h-72 items-center justify-center bg-[#f6f5f1] p-5 sm:h-auto sm:w-56">
                                <img v-if="selectedBook.封面链接" :src="selectedBook.封面链接" :alt="selectedBook.书名" class="max-h-full max-w-full rounded-[6px] shadow-[0_10px_24px_rgba(17,17,17,0.12)]">
                                <div v-else class="text-sm text-[#8a7762]">暂无封面</div>
                            </div>

                            <div class="flex flex-1 flex-col justify-center p-6 sm:p-8">
                                <p class="mb-3 text-xs uppercase tracking-[0.3em] text-[#9a8c78]">Reading Notes</p>
                                <h2 class="mb-2 text-3xl font-bold leading-tight text-[#1f1f1b]">{{ selectedBook.书名 || '未知书名' }}</h2>
                                <p class="mb-5 text-base text-[#666359]">{{ selectedBook.作者 || '未知作者' }}</p>

                                <div class="mb-4 flex flex-wrap gap-2">
                                    <span v-if="selectedBook.一级分类" class="rounded-full border border-[#e8e4db] bg-[#faf9f6] px-3 py-1 text-xs text-[#6e6456]">{{ selectedBook.一级分类 }}</span>
                                    <span class="rounded-full border border-[#e8e4db] bg-[#faf9f6] px-3 py-1 text-xs text-[#7c6b5a]">{{ selectedBook.是否读完 || '未知状态' }}</span>
                                    <span class="rounded-full border border-[#e8e4db] bg-[#faf9f6] px-3 py-1 text-xs text-[#7c6b5a]">阅读：{{ formatReadingTime(selectedBook.阅读时长) }}</span>
                                </div>

                                <p v-if="selectedBook.简介" class="text-sm leading-8 text-[#706d66]">
                                    {{ selectedBook.简介 }}
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="rounded-[8px] border border-[#ece9e2] bg-white p-6 sm:p-10">
                        <div class="mb-8 border-b border-[#efede7] pb-5">
                            <h3 class="text-xl font-bold text-[#1f1f1b]">阅读时间轴</h3>
                            <p class="mt-1 text-sm text-[#7c6b5a]">按阅读顺序展开原文、想法与完成时刻</p>
                        </div>

                        <div class="note-cards text-[15px] leading-8 text-[#3f3428]" v-html="renderNoteCards(selectedBook.笔记)"></div>
                    </div>
                </section>
            </template>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, watch, onMounted } = Vue;

        createApp({
            setup() {
                const books = ref([]);
                const loading = ref(true);
                const error = ref('');
                const currentView = ref('list');
                const selectedBook = ref(null);
                const activeCategory = ref('全部');
                const currentPage = ref(1);
                const itemsPerPage = 9;

                const openDetail = (book) => {
                    selectedBook.value = book;
                    currentView.value = 'detail';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const goBack = () => {
                    currentView.value = 'list';
                    selectedBook.value = null;
                };

                const formatReadingTime = (value) => {
                    if (!value || value === '0分钟') return '0分钟';
                    return value;
                };

                const fetchData = async () => {
                    try {
                        loading.value = true;
                        error.value = '';
                        const response = await fetch('./weread_data.json');
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        const data = await response.json();
                        books.value = Array.isArray(data) ? data : [];
                    } catch (err) {
                        error.value = err?.message || '未知错误';
                        console.error('读取 weread_data.json 失败', err);
                    } finally {
                        loading.value = false;
                    }
                };

                const categories = computed(() => {
                    const all = books.value
                        .map((book) => book.一级分类)
                        .filter((item) => typeof item === 'string' && item.trim());
                    return [...new Set(all)].sort((a, b) => a.localeCompare(b, 'zh-CN'));
                });

                const filteredBooks = computed(() => {
                    if (activeCategory.value === '全部') {
                        return books.value;
                    }
                    return books.value.filter((book) => book.一级分类 === activeCategory.value);
                });

                const paginatedBooks = computed(() => {
                    const start = (currentPage.value - 1) * itemsPerPage;
                    return filteredBooks.value.slice(start, start + itemsPerPage);
                });

                const totalPages = computed(() => {
                    return Math.max(1, Math.ceil(filteredBooks.value.length / itemsPerPage));
                });

                watch(activeCategory, () => {
                    currentPage.value = 1;
                });

                const renderNoteCards = (mdStr) => {
                    if (!mdStr) return '';

                    const rawHtml = DOMPurify.sanitize(marked.parse(mdStr));
                    const container = document.createElement('div');
                    container.innerHTML = rawHtml;

                    const nodes = Array.from(container.childNodes).filter((node) => node.nodeType === 1);
                    const getTag = (node) => (node.tagName || '').toLowerCase();
                    const getText = (node) => (node.textContent || '').replace(/\s+/g, ' ').trim();
                    const escapeHtml = (str) => str
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');

                    const isSection = (node) => ['h1', 'h2'].includes(getTag(node));
                    const isDivider = (node) => getTag(node) === 'hr';
                    const isSource = (node) => getTag(node) === 'blockquote';
                    const isThought = (node) => {
                        const tag = getTag(node);
                        if (tag !== 'p' && tag !== 'li') return false;
                        return /^\u{1F4A1}/u.test(getText(node));
                    };
                    const isTime = (node) => {
                        const tag = getTag(node);
                        if (tag !== 'p' && tag !== 'li') return false;
                        const text = getText(node).replace(/^\*+|\*+$/g, '');
                        return /^\u{1F552}/u.test(text);
                    };

                    let result = '';
                    let currentSectionTitle = '笔记';
                    let sectionItems = [];
                    let cardParts = [];

                    const wrapCard = (content) => `<article class="note-card">${content}</article>`;

                    const flushCard = () => {
                        if (!cardParts.length) return;
                        sectionItems.push(wrapCard(cardParts.join('')));
                        cardParts = [];
                    };

                    const flushSection = () => {
                        flushCard();
                        if (!sectionItems.length) return;
                        result += `
                            <section class="note-section">
                                <div class="note-section-title">${currentSectionTitle}</div>
                                <div class="note-section-body">
                                    <div class="note-list">${sectionItems.join('')}</div>
                                </div>
                            </section>
                        `;
                        sectionItems = [];
                    };

                    const cardHas = (className) => cardParts.some((part) => part.includes(className));

                    for (const node of nodes) {
                        if (isSection(node)) {
                            flushSection();
                            currentSectionTitle = node.innerHTML;
                            continue;
                        }

                        if (isDivider(node)) {
                            flushCard();
                            sectionItems.push('<div class="note-divider"></div>');
                            continue;
                        }

                        if (isSource(node)) {
                            if (cardParts.length) flushCard();
                            cardParts.push(`<div class="note-source">${node.innerHTML}</div>`);
                            continue;
                        }

                        if (isThought(node)) {
                            if (cardHas('note-thought')) flushCard();
                            cardParts.push(`<div class="note-thought">${node.innerHTML}</div>`);
                            continue;
                        }

                        if (isTime(node)) {
                            if (!cardParts.length) continue;
                            const icon = String.fromCodePoint(0x1F552);
                            const timeText = getText(node).replace(/^\*?\u{1F552}\s*/u, `${icon} `).trim();
                            cardParts.push(`<div class="note-time">${escapeHtml(timeText)}</div>`);
                            flushCard();
                            continue;
                        }

                        flushCard();
                        if (node.outerHTML && getText(node)) {
                            sectionItems.push(wrapCard(`<div class="note-misc">${node.outerHTML}</div>`));
                        }
                    }

                    flushSection();
                    return result;
                };

                onMounted(fetchData);

                return {
                    books,
                    loading,
                    error,
                    currentView,
                    selectedBook,
                    activeCategory,
                    currentPage,
                    categories,
                    paginatedBooks,
                    totalPages,
                    openDetail,
                    goBack,
                    formatReadingTime,
                    renderNoteCards
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
